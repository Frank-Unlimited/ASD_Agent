<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 Vite 代理</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f9f9f9;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>测试 Vite 代理配置</h1>
    
    <div>
        <button onclick="testMemoryHealth()">测试记忆服务健康检查</button>
        <button onclick="testRAGHealth()">测试 RAG 服务健康检查</button>
        <button onclick="testMemoryWrite()">测试记忆写入</button>
    </div>
    
    <div id="result" class="result"></div>

    <script>
        const resultDiv = document.getElementById('result');

        function showResult(message, isSuccess = true) {
            resultDiv.innerHTML = `<span class="${isSuccess ? 'success' : 'error'}">${message}</span>`;
        }

        async function testMemoryHealth() {
            try {
                showResult('正在测试记忆服务...');
                const response = await fetch('/api/memory/health');
                const data = await response.json();
                showResult(`✅ 记忆服务健康检查成功！<br><pre>${JSON.stringify(data, null, 2)}</pre>`, true);
            } catch (error) {
                showResult(`❌ 记忆服务健康检查失败：${error.message}`, false);
            }
        }

        async function testRAGHealth() {
            try {
                showResult('正在测试 RAG 服务...');
                const response = await fetch('/api/rag/healthcheck');
                const data = await response.json();
                showResult(`✅ RAG 服务健康检查成功！<br><pre>${JSON.stringify(data, null, 2)}</pre>`, true);
            } catch (error) {
                showResult(`❌ RAG 服务健康检查失败：${error.message}`, false);
            }
        }

        async function testMemoryWrite() {
            try {
                showResult('正在测试记忆写入...');
                const response = await fetch('/api/memory/write', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        group_id: 'test_user',
                        content: '这是一条测试记忆',
                        reference_time: new Date().toISOString()
                    })
                });
                
                if (response.ok) {
                    showResult(`✅ 记忆写入成功！状态码：${response.status}`, true);
                } else {
                    showResult(`❌ 记忆写入失败！状态码：${response.status}`, false);
                }
            } catch (error) {
                showResult(`❌ 记忆写入失败：${error.message}`, false);
            }
        }
    </script>
</body>
</html>
